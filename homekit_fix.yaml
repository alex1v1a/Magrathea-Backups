# HomeKit Bridge Configuration - WSL Mirrored Mode Fix
# Ensures HomeKit binds to the correct network interface (10.0.1.90)

homekit:
  - name: "HASS Bridge"
    port: 21064
    ip_address: 10.0.1.90
    advertise_ip:
      - 10.0.1.90
    filter:
      include_domains:
        - binary_sensor
        - button
        - automation
        - climate
        - device_tracker
        - fan
        - humidifier
        - input_boolean
        - input_button
        - input_select
        - light
        - lock
        - media_player
        - remote
        - scene
        - script
        - select
        - sensor
        - switch
