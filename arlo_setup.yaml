# To install direct Arlo integration:
# 1. HACS → Integrations → Search "Arlo"
# 2. Install "Aarlo" (custom component)
# 3. Restart HA
# 4. Add to configuration.yaml:

aarlo:
  username: alex@1v1a.com
  password: Section9
  refresh_devices_every: 2
  stream_timeout: 120
  reconnect_every: 90
  
# Or use UI config flow after installation

