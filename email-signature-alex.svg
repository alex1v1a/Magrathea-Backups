<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="600" height="200" fill="#1a1a1a"/>
  
  <!-- V Logo with arrow -->
  <g transform="translate(60, 100)">
    <!-- V shape -->
    <path d="M -30 -35 L 0 15 L 30 -35" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow pointing up -->
    <path d="M 0 15 L 0 -45 M -10 -35 L 0 -45 L 10 -35" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Vertical separator line -->
  <line x1="130" y1="40" x2="130" y2="160" stroke="#444444" stroke-width="1"/>
  
  <!-- Name -->
  <text x="150" y="80" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Alexander Sferrazza</text>
  
  <!-- Title -->
  <text x="150" y="105" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#aaaaaa">Accounts Manager</text>
  
  <!-- Horizontal separator -->
  <line x1="150" y1="120" x2="560" y2="120" stroke="#444444" stroke-width="1"/>
  
  <!-- Phone label (P) in blue -->
  <text x="150" y="145" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#4a9eff">P:</text>
  
  <!-- Phone number -->
  <text x="170" y="145" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">(808) 381-8835</text>
  
  <!-- Address line 1 -->
  <text x="150" y="165" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#aaaaaa">5900 Balcones Drive, Suite 100</text>
  
  <!-- Address line 2 -->
  <text x="150" y="182" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#aaaaaa">Austin, TX 78731</text>
</svg>