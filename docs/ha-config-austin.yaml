# ============================================
# HOME ASSISTANT CONFIGURATION - AUSTIN
# Multi-Location HomeKit Setup
# Location: Austin, TX (10.0.1.x)
# ============================================

# Default config (keep existing)
default_config:

# ============================================
# FRONTEND - LCARS THEME
# ============================================
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /local/community/lovelace-card-mod/card-mod.js
    - /local/community/ha-lcars/lcars.js
  extra_html_url:
    - https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&display=swap

# ============================================
# INCLUDES
# ============================================
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ============================================
# HOME ASSISTANT CORE SETTINGS
# ============================================
homeassistant:
  name: Home
  latitude: !secret home_latitude_austin
  longitude: !secret home_longitude_austin
  elevation: 150
  unit_system: imperial
  time_zone: America/Chicago
  internal_url: "http://10.0.1.142:8123"
  external_url: !secret external_url_austin
  packages: !include_dir_named packages
  
  # Auth providers
  auth_providers:
    - type: homeassistant
    - type: trusted_networks
      trusted_networks:
        - 10.0.1.0/24
        - 127.0.0.1
        - ::1

# ============================================
# HOMEKIT BRIDGE - AUSTIN ONLY
# ============================================
homekit:
  - name: "HASS Bridge Austin"
    port: 51827
    ip_address: 10.0.1.142
    
    # Filter to ONLY Austin devices
    filter:
      include_domains:
        - light
        - climate
        - sensor
        - binary_sensor
        - switch
        - fan
        - cover
        - lock
        - media_player
      
      # Exclude system entities
      exclude_entities:
        - sensor.date
        - sensor.time
        - sensor.ha_uptime
        - update.home_assistant_core_update
        - update.home_assistant_supervisor_update
        - update.home_assistant_operating_system_update
      
      # Include only Austin-prefixed entities
      include_entity_globs:
        - "*.austin_*"
        - "sensor.atom_*"  # Your Atom Lite
    
    # Entity customizations
    entity_config:
      # Lights
      light.austin_living_room:
        name: "Living Room"
        type: lightbulb
      
      light.austin_kitchen:
        name: "Kitchen"
        type: lightbulb
      
      light.austin_bedroom:
        name: "Bedroom"
        type: lightbulb
      
      light.austin_outside:
        name: "Outside Lights"
        type: lightbulb
      
      # Climate
      climate.austin_thermostat:
        name: "Thermostat"
        type: thermostat
      
      # Locks
      lock.austin_front_door:
        name: "Front Door"
      
      # Media Players
      media_player.austin_living_room_speaker:
        name: "Living Room Speaker"
        type: speaker
      
      # Sensors with device class
      sensor.austin_temperature:
        name: "Indoor Temperature"
        type: temperature
      
      sensor.austin_humidity:
        name: "Indoor Humidity"
        type: humidity

# ============================================
# LCARS INPUT HELPERS
# ============================================
input_boolean:
  lcars_sound:
    name: LCARS Sound
    icon: mdi:volume-high
  
  lcars_texture:
    name: LCARS Texture
    icon: mdi:wallpaper
  
  # Location presence
  austin_guest_mode:
    name: "Austin: Guest Mode"
    icon: mdi:account-group

input_number:
  lcars_horizontal:
    name: LCARS Horizontal
    min: 6
    max: 60
    step: 1
    unit_of_measurement: px
    icon: mdi:arrow-left-right
  
  lcars_vertical:
    name: LCARS Vertical
    min: 26
    max: 60
    step: 1
    unit_of_measurement: px
    icon: mdi:arrow-up-down
  
  # Climate setpoints
  austin_comfort_temp:
    name: "Austin: Comfort Temperature"
    min: 65
    max: 80
    step: 1
    unit_of_measurement: "°F"
    icon: mdi:thermometer

input_select:
  austin_home_mode:
    name: "Austin: Home Mode"
    options:
      - Home
      - Away
      - Sleep
      - Vacation
    initial: Home
    icon: mdi:home-automation

# ============================================
# NOTIFICATIONS
# ============================================
notify:
  - name: mobile_app_alexander
    platform: group
    services:
      - service: mobile_app_alexander_iphone
      - service: mobile_app_alexandra_iphone

# ============================================
# ZEROTIER / TAILSCALE (for remote access)
# ============================================
# Install Tailscale add-on for secure remote access
# No port forwarding needed

# ============================================
# LOGGING
# ============================================
logger:
  default: warning
  logs:
    homeassistant.components.homekit: debug
    homeassistant.components.homekit.accessories: debug
    pyhap: debug

# ============================================
# RECORDER (database optimization)
# ============================================
recorder:
  purge_keep_days: 30
  exclude:
    domains:
      - updater
    entity_globs:
      - sensor.weather_*

# ============================================
# HISTORY
# ============================================
history:
  exclude:
    domains:
      - automation
      - updater

# ============================================
# LOG VIEWER
# ============================================
# Install Log Viewer add-on for easy log access
