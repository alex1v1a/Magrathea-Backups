esphome:
  name: atom-lite-trillian
  friendly_name: Atom Lite Trillian
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    version: recommended

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key
  services:
    - service: start_voice_assistant
      then:
        - voice_assistant.start
    - service: stop_voice_assistant
      then:
        - voice_assistant.stop

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Atom-Lite-Trillian"
    password: !secret wifi_ap_password

captive_portal:

# Status LED
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO27
    num_leds: 1
    chipset: SK6812
    id: status_led
    name: "Status LED"
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Pulse Blue"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Flash Yellow"
          transition_length: 0.2s
          update_interval: 0.2s
          min_brightness: 0%
          max_brightness: 100%

# Button and Status
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO39
      mode: INPUT
      inverted: true
    name: "Trillian Button"
    id: trillian_button
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - voice_assistant.start:
        - light.turn_on:
            id: status_led
            red: 0%
            green: 0%
            blue: 100%
            brightness: 100%
    on_release:
      then:
        - voice_assistant.stop:
        - light.turn_off:
            id: status_led
  - platform: status
    name: "Status"

# Voice Assistant Configuration
voice_assistant:
  id: va
  microphone: atom_microphone
  speaker: atom_speaker
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    then:
      - light.turn_on:
          id: status_led
          red: 0%
          green: 0%
          blue: 100%
          brightness: 100%
          effect: "Pulse Blue"
  on_stt_vad_end:
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 100%
          blue: 100%
          brightness: 100%
  on_tts_start:
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 100%
          blue: 100%
          brightness: 100%
  on_end:
    then:
      - delay: 2s
      - light.turn_off:
          id: status_led
  on_error:
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 100%
      - delay: 2s
      - light.turn_off:
          id: status_led

# Microphone
microphone:
  - platform: i2s_audio
    id: atom_microphone
    i2s_din_pin: GPIO22
    adc_type: external
    pdm: true
    channel: left

# Speaker
speaker:
  - platform: i2s_audio
    id: atom_speaker
    dac_type: external
    i2s_dout_pin: GPIO21

# I2S Audio
i2s_audio:
  - id: i2s_out
    i2s_lrclk_pin: GPIO25
    i2s_bclk_pin: GPIO19

# Connection status indicator
interval:
  - interval: 5s
    then:
      - if:
          condition:
            not:
              wifi.connected:
          then:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 100%
                blue: 0%
                brightness: 100%
                effect: "Flash Yellow"
            - delay: 1s
            - light.turn_off:
                id: status_led

# Text sensors for status
text_sensor:
  - platform: template
    name: "Voice Assistant State"
    lambda: |-
      if (id(va).is_running()) {
        return std::string("Listening");
      } else {
        return std::string("Idle");
      }
    update_interval: 1s

# Wake word configuration - using Home Assistant wake word detection
# The voice assistant will use Home Assistant's wake word detection when streaming

# Additional sensors
sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s


