# ESPHome Voice Assistant Configuration for M5Stack Atom Lite
# Complete working configuration with wake word support

substitutions:
  name: atom-lite-voice-assistant
  friendly_name: Atom Lite Voice Assistant

esphome:
  name: ${name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  min_version: 2025.5.0

esp32:
  board: m5stack-atom
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

logger:
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Atom-Lite Fallback Hotspot"

captive_portal:

button:
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory reset

# ============================================================
# I2S Audio Configuration for Atom Lite
# ============================================================
i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19

# ============================================================
# Microphone Configuration
# Atom Lite uses PDM microphone on GPIO23
# ============================================================
microphone:
  - platform: i2s_audio
    id: atom_mic
    i2s_din_pin: GPIO23
    adc_type: external
    pdm: true
    sample_rate: 16000
    correct_dc_offset: true

# ============================================================
# Speaker Configuration
# Atom Lite speaker on GPIO22
# ============================================================
speaker:
  - platform: i2s_audio
    id: atom_speaker
    i2s_dout_pin: GPIO22
    dac_type: external
    bits_per_sample: 16bit
    sample_rate: 16000
    channel: stereo

# ============================================================
# Media Player for audio responses
# ============================================================
media_player:
  - platform: speaker
    name: None
    id: atom_media_player
    announcement_pipeline:
      speaker: atom_speaker
      format: WAV
    codec_support_enabled: false
    buffer_size: 6000
    volume_min: 0.4
    files:
      - id: timer_finished_wave_file
        file: https://github.com/esphome/wake-word-voice-assistants/raw/main/sounds/timer_finished.wav
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
      - light.turn_on:
          id: led
          blue: 100%
          red: 0%
          green: 0%
          brightness: 100%
    on_idle:
      - script.execute: start_wake_word
      - light.turn_off: led

# ============================================================
# Micro Wake Word Configuration
# This enables on-device wake word detection
# ============================================================
micro_wake_word:
  id: mww
  microphone: atom_mic
  stop_after_detection: false
  vad:
  models:
    - model: okay_nabu
      id: okay_nabu
    - model: hey_jarvis
      id: hey_jarvis
    - model: hey_mycroft
      id: hey_mycroft
    - model: alexa
      id: alexa
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# ============================================================
# Voice Assistant Configuration
# CRITICAL: Must reference micro_wake_word via id for
# wake_word_entity and wake_word_id to be populated
# ============================================================
voice_assistant:
  id: va
  microphone: atom_mic
  media_player: atom_media_player
  micro_wake_word: mww  # This links to the micro_wake_word component
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  
  on_listening:
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        brightness: 60%
  on_stt_vad_end:
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        brightness: 100%
  on_tts_start:
    - light.turn_on:
        id: led
        green: 100%
        red: 0%
        blue: 0%
        brightness: 100%
  on_end:
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    - if:
        condition:
          - lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - wait_until:
              - and:
                  - not: voice_assistant.is_running:
                  - not: speaker.is_playing:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
    - script.execute: reset_led
  on_error:
    - light.turn_on:
        id: led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 100%
    - delay: 2s
    - script.execute: reset_led
  on_client_connected:
    - delay: 2s
    - script.execute: start_wake_word
    - light.turn_on:
        id: led
        green: 89%
        red: 100%
        blue: 71%
        brightness: 60%
  on_client_disconnected:
    - script.execute: stop_wake_word
    - light.turn_off: led
  on_timer_finished:
    - script.execute: stop_wake_word
    - wait_until:
        not: microphone.is_capturing:
    - switch.turn_on: timer_ringing
    - light.turn_on:
        id: led
        green: 100%
        red: 0%
        blue: 0%
        brightness: 100%
    - wait_until:
        - switch.is_off: timer_ringing
    - light.turn_off: led
    - switch.turn_off: timer_ringing

# ============================================================
# LED Control
# ============================================================
light:
  - platform: esp32_rmt_led_strip
    id: led
    name: Status LED
    pin: GPIO27
    default_transition_length: 0s
    chipset: SK6812
    num_leds: 1
    rgb_order: grb

# ============================================================
# Button Control
# ============================================================
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: Button
    disabled_by_default: true
    id: atom_button
    on_multi_click:
      - timing:
          - ON for at least 50ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                - script.execute: start_wake_word
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn

# ============================================================
# Scripts for wake word management
# ============================================================
script:
  - id: reset_led
    then:
      - if:
          condition:
            - lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - light.turn_on:
                id: led
                red: 100%
                green: 89%
                blue: 71%
                brightness: 60%
          else:
            - light.turn_off: led

  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not: voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not: voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:

  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - micro_wake_word.stop:

# ============================================================
# Switches
# ============================================================
switch:
  - platform: template
    id: timer_ringing
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - lambda: |-
          id(atom_media_player)
            ->make_call()
            .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
            .set_announcement(true)
            .perform();
          id(atom_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      - media_player.stop:
          announcement: true
    on_turn_on:
      - lambda: |-
          id(atom_media_player)
            ->make_call()
            .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
            .set_announcement(true)
            .perform();
          id(atom_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_wave_file
          announcement: true
      - delay: 15min
      - switch.turn_off: timer_ringing

# ============================================================
# Selectors for configuration
# ============================================================
select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return x == "In Home Assistant";
          then:
            - micro_wake_word.stop:
            - delay: 500ms
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
      - if:
          condition:
            lambda: return x == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
            - delay: 500ms
            - micro_wake_word.start:

  - platform: template
    name: Wake word
    id: active_wake_word
    optimistic: true
    restore_value: true
    options:
      - Okay Nabu
      - Hey Jarvis
      - Hey Mycroft
      - Alexa
    initial_option: Hey Jarvis
    on_value:
      - lambda: |-
          if (x == "Okay Nabu") {
            id(mww).enable_model(id(okay_nabu));
            id(mww).disable_model(id(hey_jarvis));
            id(mww).disable_model(id(hey_mycroft));
            id(mww).disable_model(id(alexa));
          } else if (x == "Hey Jarvis") {
            id(mww).disable_model(id(okay_nabu));
            id(mww).enable_model(id(hey_jarvis));
            id(mww).disable_model(id(hey_mycroft));
            id(mww).disable_model(id(alexa));
          } else if (x == "Hey Mycroft") {
            id(mww).disable_model(id(okay_nabu));
            id(mww).disable_model(id(hey_jarvis));
            id(mww).enable_model(id(hey_mycroft));
            id(mww).disable_model(id(alexa));
          } else if (x == "Alexa") {
            id(mww).disable_model(id(okay_nabu));
            id(mww).disable_model(id(hey_jarvis));
            id(mww).disable_model(id(hey_mycroft));
            id(mww).enable_model(id(alexa));
          }

  - platform: template
    name: Wake word sensitivity
    id: wake_word_sensitivity
    optimistic: true
    initial_option: Moderately sensitive
    restore_value: true
    entity_category: config
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    on_value:
      lambda: |-
        if (x == "Slightly sensitive") {
          id(okay_nabu).set_probability_cutoff(217);
          id(hey_jarvis).set_probability_cutoff(247);
          id(hey_mycroft).set_probability_cutoff(253);
          id(alexa).set_probability_cutoff(247);
        } else if (x == "Moderately sensitive") {
          id(okay_nabu).set_probability_cutoff(176);
          id(hey_jarvis).set_probability_cutoff(235);
          id(hey_mycroft).set_probability_cutoff(242);
          id(alexa).set_probability_cutoff(235);
        } else if (x == "Very sensitive") {
          id(okay_nabu).set_probability_cutoff(143);
          id(hey_jarvis).set_probability_cutoff(212);
          id(hey_mycroft).set_probability_cutoff(237);
          id(alexa).set_probability_cutoff(212);
        }
