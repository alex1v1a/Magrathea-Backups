title: LCARS Quick Start
type: panel
icon: mdi:rocket-launch
path: lcars-quick-start
badges: []
cards:
  - type: vertical-stack
    cards:
      # Welcome Header
      - type: markdown
        card_mod:
          class: header-left
          style: |
            ha-card {
              --ha-card-background: #8899FF !important;
            }
        content: '# WELCOME TO LCARS'

      # Introduction
      - type: markdown
        card_mod:
          class: middle-left
        content: |
          ## Library Computer Access/Retrieval System
          
          This is a Star Trek themed interface for Home Assistant.
          
          **Getting Started:**
          1. Install card-mod from HACS
          2. Add font resource (Settings → Dashboards → Resources)
          3. Copy theme files to config/themes/
          4. Select LCARS theme in your Profile
          5. Create helper entities

      # Action Buttons
      - type: horizontal-stack
        card_mod:
          class: middle-left
        cards:
          - type: button
            name: Documentation
            icon: mdi:book-open-variant
            show_name: true
            show_icon: true
            tap_action:
              action: navigate
              navigation_path: /config/dashboards
            card_mod:
              class: button-lozenge-left

          - type: button
            name: Profile
            icon: mdi:account
            show_name: true
            show_icon: true
            tap_action:
              action: navigate
              navigation_path: /profile
            card_mod:
              class: button-lozenge-right

      # Quick Example
      - type: markdown
        card_mod:
          class: middle-left
        content: |
          ## Example Card Structure:
          
          ```yaml
          type: vertical-stack
          cards:
            - type: markdown
              card_mod:
                class: header-left
              content: '# HEADER'
            
            - type: button
              entity: light.example
              card_mod:
                class: button-lozenge-left
            
            - type: markdown
              card_mod:
                class: footer-left
              content: '## FOOTER'
          ```

      - type: markdown
        card_mod:
          class: footer-left
        content: '## LIVE LONG AND PROSPER 🖖'

  # Color Reference Card
  - type: vertical-stack
    cards:
      - type: markdown
        card_mod:
          class: header-contained
        content: '# COLOR REFERENCE'

      - type: markdown
        card_mod:
          class: middle-contained
        content: |
          | Color | Code | Use |
          |-------|------|-----|
          | Orange | #FF9900 | Primary |
          | Peach | #FFAA90 | Secondary |
          | Purple | #CC99FF | Accent |
          | Blue | #8899FF | Header |
          | Red | #CC4444 | Alert |
          | Black | #000000 | Background |

      - type: markdown
        card_mod:
          class: footer-contained
        content: '## LCARS COLOR SYSTEM'

  # Class Reference
  - type: vertical-stack
    cards:
      - type: markdown
        card_mod:
          class: header-right
        content: '# CLASS REFERENCE'

      - type: markdown
        card_mod:
          class: middle-right
        content: |
          **Headers:**
          - `header-left`
          - `header-right`
          - `header-contained`
          - `header-open`
          
          **Middle:**
          - `middle-left`
          - `middle-right`
          - `middle-contained`
          - `middle-blank`
          
          **Buttons:**
          - `button-lozenge-left/right`
          - `button-bullet-left/right`
          - `button-capped-left/right`
          - `button-barrel-left/right`
          - `button-small`
          - `button-large`

      - type: markdown
        card_mod:
          class: footer-right
        content: '## END OF FILE'
