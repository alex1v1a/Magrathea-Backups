# ==========================================
# VIEW COLOR SCHEME REFERENCE
# ==========================================
# Each view has its own accent color scheme:
#
# Bridge:     Orange (#FF9900) - Command/Primary
# Engineering: Blue (#8899FF) - Systems/Technical
# Science:    Purple (#CC99FF) - Data/Analysis
# Security:   Red (#CC4444) - Alerts/Protection
# Quarters:   Peach (#FFAA90) - Comfort/Personal
