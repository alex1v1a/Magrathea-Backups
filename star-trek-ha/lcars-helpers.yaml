# LCARS Helper Entities
# Add this to your configuration.yaml or create via UI

input_boolean:
  lcars_sound:
    name: LCARS Sound Effects
    icon: mdi:volume-high
    initial: false
    
  lcars_texture:
    name: LCARS Texture Effect
    icon: mdi:image-filter-hdr
    initial: true

input_number:
  lcars_horizontal:
    name: LCARS Horizontal Border
    icon: mdi:arrow-left-right
    initial: 30
    min: 6
    max: 60
    step: 2
    
  lcars_vertical:
    name: LCARS Vertical Border
    icon: mdi:arrow-up-down
    initial: 40
    min: 26
    max: 60
    step: 2
    
  lcars_menu_font:
    name: LCARS Menu Font Size
    icon: mdi:format-size
    initial: 18
    min: 12
    max: 36
    step: 2

# Optional: LCARS Header Sensor
template:
  - sensor:
      - name: "LCARS Header"
        state: "USS HOME - NCC-1701"
        attributes:
          stardate: "{{ now().strftime('%Y%m%d.%H') }}"
          location: "Sunfield, TX"
          status: "Operational"
