# Home Assistant Configuration
# Generated for Star Trek LCARS Theme

# Required for LCARS theme
frontend:
  themes: !include_dir_merge_named themes

# Lovelace Dashboards (LCARS)
lovelace:
  mode: storage
  dashboards:
    lcars-bridge:
      mode: yaml
      title: "LCARS Bridge"
      icon: mdi:star-four-points
      show_in_sidebar: true
      filename: dashboards/lcars-bridge.yaml
    
    lcars-engineering:
      mode: yaml
      title: "LCARS Engineering"
      icon: mdi:engine
      show_in_sidebar: true
      filename: dashboards/lcars-engineering.yaml
    
    lcars-science:
      mode: yaml
      title: "LCARS Science"
      icon: mdi:telescope
      show_in_sidebar: true
      filename: dashboards/lcars-science.yaml
    
    lcars-security:
      mode: yaml
      title: "LCARS Security"
      icon: mdi:shield
      show_in_sidebar: true
      filename: dashboards/lcars-security.yaml
    
    lcars-quarters:
      mode: yaml
      title: "LCARS Quarters"
      icon: mdi:bed
      show_in_sidebar: true
      filename: dashboards/lcars-quarters.yaml

# Basic HA Configuration
default_config:

homeassistant:
  name: Home
  latitude: !secret latitude
  longitude: !secret longitude
  elevation: 200
  unit_system: imperial
  time_zone: America/Chicago
  external_url: ""
  internal_url: ""

# Enable HACS (if installed)
# hacs:

# Recorder (database)
recorder:
  db_url: sqlite:///config/home-assistant_v2.db
  purge_keep_days: 7

# Logger
logger:
  default: info
  logs:
    homeassistant.core: warning

# Automation
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ============================================
# GOVEE LIGHTS INTEGRATION
# ============================================
goveelife:
  api_key: !secret govee_api_key
  scan_interval: 60
  timeout: 10

