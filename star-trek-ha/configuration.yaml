# ============================================
# TUYA SMART HOME INTEGRATION
# ============================================
tuya:
  username: !secret tuya_username
  password: !secret tuya_password
  country_code: "1"
  app_type: "smart_life"  # or "tuyaSmart"

# ============================================
# ALEXA INTEGRATION (via Home Assistant Cloud)
# ============================================
# Option 1: Home Assistant Cloud (Recommended - $6.50/month)
# cloud:
#   alexa:
#     filter:
#       include_domains:
#         - light
#         - switch
#         - sensor
#         - climate
#         - fan
#         - cover
#       exclude_entities:
#         - light.garage_light

# Option 2: Manual Alexa Smart Home Skill (Free, complex setup)
# Requires AWS account and custom skill deployment

# ============================================
# HOMEKIT BRIDGE
# ============================================
homekit:
  - name: HA Bridge
    port: 21064
    filter:
      include_domains:
        - light
        - switch
        - camera
        - sensor
        - binary_sensor
        - climate
        - fan
    entity_config:
      camera.toolbox:
        video_codec: copy
      camera.backyard:
        video_codec: copy
      camera.garden_tools:
        video_codec: copy

