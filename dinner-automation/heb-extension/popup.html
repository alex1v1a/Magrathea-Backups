<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 15px 0;
      color: #d81e05;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-bar {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .status-row:last-child {
      margin-bottom: 0;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 6px;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: #ccc;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .toggle-switch.active {
      background: #4caf50;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.3s;
    }
    .toggle-switch.active::after {
      transform: translateX(20px);
    }
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      flex: 1;
      padding: 10px;
      background: #d81e05;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #b81804;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    button.secondary {
      background: #666;
    }
    button.secondary:hover {
      background: #444;
    }
    button.danger {
      background: #f44336;
    }
    button.danger:hover {
      background: #d32f2f;
    }
    .section {
      margin-bottom: 15px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .item-list {
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 8px;
    }
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
    }
    .item:last-child {
      border-bottom: none;
    }
    .item-name {
      flex: 1;
    }
    .item-remove {
      color: #f44336;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
    }
    .item-remove:hover {
      background: #ffebee;
      border-radius: 4px;
    }
    .add-item-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .add-item-row input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }
    .add-item-row button {
      padding: 8px 12px;
      font-size: 12px;
    }
    .log {
      font-size: 11px;
      color: #666;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 4px;
      max-height: 100px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 15px;
      border-bottom: 1px solid #e0e0e0;
    }
    .tab {
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab.active {
      border-bottom-color: #d81e05;
      color: #d81e05;
      font-weight: 600;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <h1>🛒 HEB Auto Shopper</h1>
  
  <div class="status-bar">
    <div class="status-row">
      <span>Last Sync:</span>
      <span id="last-sync">Never</span>
    </div>
    <div class="status-row">
      <span>Meal Plan Items:</span>
      <span id="item-count">0 items</span>
    </div>
    <div class="status-row">
      <span>Cart Status:</span>
      <span id="cart-status">Unknown</span>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Auto-Sync (Every 30 min)</span>
    <div class="toggle-switch" id="auto-sync-toggle"></div>
  </div>

  <div class="button-group">
    <button id="sync-now-btn">Sync Now</button>
    <button id="view-cart-btn" class="secondary">View Cart</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="meal-plan">Meal Plan</div>
    <div class="tab" data-tab="log">Log</div>
  </div>

  <div id="meal-plan-tab" class="tab-content active">
    <div class="section">
      <div class="section-title">Current Meal Plan</div>
      <div class="item-list" id="meal-plan-list">
        <div style="color: #999; text-align: center; padding: 20px;">No meal plan loaded</div>
      </div>
      <div class="add-item-row">
        <input type="text" id="new-item-name" placeholder="Item name (e.g., Chicken breast)">
        <button id="add-item-btn">Add</button>
      </div>
    </div>
    
    <div class="button-group">
      <button id="clear-all-btn" class="danger">Clear All</button>
      <button id="load-default-btn" class="secondary">Load Default</button>
    </div>
  </div>

  <div id="log-tab" class="tab-content">
    <div class="log" id="log">Extension loaded. Click "Sync Now" to start...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
