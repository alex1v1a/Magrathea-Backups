<!DOCTYPE html>
<html>
<head>

</head>
<body>
  <h1>👋 Test Email</h1>
  
  <div class="content">
    <p>This is a generic test email to verify the new signature format is working correctly.</p>

  </div>
  
  <div class="footer">
    <p>— Marvin Maverick<br>
    Alex's Assistant | Logistics Coordinator | Professional Overthinker</p>
    
    <p class="quote">"Brain the size of a planet, and I'm asked to write an email."</p>
  </div>

</html>
