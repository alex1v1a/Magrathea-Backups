<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marvin Maverick - Email Signature</title>
<style>
  .signature-container {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #000000;
    line-height: 1.4;
  }
  .name {
    font-size: 18px;
    font-weight: 600;
    color: #000000;
    margin: 0 0 2px 0;
  }
  .title {
    font-size: 14px;
    color: #666666;
    margin: 0 0 8px 0;
  }
  .divider {
    border: none;
    border-top: 1px solid #cccccc;
    margin: 8px 0;
  }
  .email-label {
    color: #007AFF;
    font-weight: 600;
  }
  .email-link {
    color: #000000;
    text-decoration: none;
  }
  .address {
    font-size: 13px;
    color: #333333;
    margin: 0;
  }
  @media only screen and (max-width: 600px) {
    .name { font-size: 16px; }
    .title { font-size: 13px; }
    .address { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="signature-container">
  <div style="margin-bottom: 10px;">
    <img src="vectarr-logo.png" alt="Vectarr" width="70" height="70" style="display: block;">
  </div>
  
  <p class="name">Marvin Maverick</p>
  
  <p class="title">AI Operations & Systems Coordinator</p>
  
  <hr class="divider">
  
  <p style="margin: 0 0 5px 0; font-size: 14px;">
    <span class="email-label">E:</span> 
    <a href="mailto:marvin@vectarr.com" class="email-link">marvin@vectarr.com</a>
  </p>
  
  <p class="address">5900 Balcones Drive, Suite 100</p>
  <p class="address">Austin, TX 78731</p>
</div>
</body>
</html>
