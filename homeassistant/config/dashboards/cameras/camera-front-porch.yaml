# =============================================================================
# FRONT PORCH CAMERA - Detailed View
# =============================================================================

title: Front Porch Camera
path: camera-front-porch
icon: mdi:patio-heater
subview: true
back_path: /lovelace/security-main

theme: Backend-selected

sidebar:
  - type: entities
    title: Camera Controls
    entities:
      - entity: camera.front_porch
        name: Stream Status
      - entity: switch.front_porch_camera_enabled
        name: Camera Power
      - entity: switch.front_porch_recording
        name: Recording
      - entity: switch.front_porch_motion_detection
        name: Motion Detection

  - type: history-graph
    title: Motion Events (24h)
    hours_to_show: 24
    entities:
      - binary_sensor.front_porch_motion
      - binary_sensor.front_porch_person_detected
      - binary_sensor.front_porch_package_detected

views:
  - type: vertical-stack
    cards:
      - type: markdown
        content: "[← Back to Security Dashboard](/lovelace/security-main)"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
            }

      - type: picture-entity
        entity: camera.front_porch
        name: Front Porch - Live
        show_state: false
        show_name: true
        camera_view: live
        aspect_ratio: "16:9"
        card_mod:
          style: |
            ha-card {
              height: 60vh;
            }

      - type: horizontal-stack
        cards:
          - type: button
            name: Snapshot
            icon: mdi:camera
            tap_action:
              action: call-service
              service: camera.snapshot
              target:
                entity_id: camera.front_porch

          - type: button
            name: Record
            icon: mdi:record-rec
            tap_action:
              action: call-service
              service: switch.toggle
              target:
                entity_id: switch.front_porch_recording

          - type: button
            name: Light
            icon: mdi:lightbulb
            tap_action:
              action: call-service
              service: switch.toggle
              target:
                entity_id: switch.front_porch_light

  - type: logbook
    entities:
      - binary_sensor.front_porch_motion
      - binary_sensor.front_porch_package_detected
    hours_to_show: 12
    title: Motion & Package Events
