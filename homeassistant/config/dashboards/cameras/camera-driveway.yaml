# =============================================================================
# DRIVEWAY CAMERA - Detailed View
# =============================================================================
# Individual camera view with full controls, playback, and motion timeline
# =============================================================================

title: Driveway Camera
path: camera-driveway
icon: mdi:road-variant
subview: true
back_path: /lovelace/security-main

theme: Backend-selected

# Sidebar with camera controls and status
sidebar:
  - type: entities
    title: Camera Controls
    entities:
      - entity: camera.driveway
        name: Stream Status
        icon: mdi:camera
      - entity: switch.driveway_camera_enabled
        name: Camera Power
        icon: mdi:power
      - entity: switch.driveway_recording
        name: Recording
        icon: mdi:record-rec
      - entity: switch.driveway_motion_detection
        name: Motion Detection
        icon: mdi:motion-sensor
      - entity: number.driveway_motion_sensitivity
        name: Sensitivity

  - type: entities
    title: Vehicle Detection
    entities:
      - entity: switch.driveway_vehicle_detection
        name: Vehicle Detection
        icon: mdi:car
      - entity: sensor.driveway_last_vehicle
        name: Last Vehicle
      - entity: sensor.driveway_vehicle_count_today
        name: Vehicles Today
      - entity: sensor.driveway_parking_status
        name: Parking Status
        icon: mdi:parking

  - type: history-graph
    title: Motion & Vehicle Events (24h)
    hours_to_show: 24
    entities:
      - binary_sensor.driveway_motion
      - binary_sensor.driveway_vehicle_detected
      - binary_sensor.driveway_person_detected

  - type: entity
    entity: sensor.driveway_last_motion
    name: Last Motion

  - type: picture-entity
    entity: image.driveway_last_snapshot
    name: Last Snapshot
    show_state: false

# Main content - Full camera view
views:
  - type: vertical-stack
    cards:
      # Navigation breadcrumb
      - type: markdown
        content: "[← Back to Security Dashboard](/lovelace/security-main)"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
            }

      # Main camera feed
      - type: picture-entity
        entity: camera.driveway
        name: Driveway - Live
        show_state: false
        show_name: true
        camera_view: live
        aspect_ratio: "16:9"
        card_mod:
          style: |
            ha-card {
              height: 60vh;
              overflow: hidden;
            }

      # Quick action bar
      - type: horizontal-stack
        cards:
          - type: button
            name: Snapshot
            icon: mdi:camera
            tap_action:
              action: call-service
              service: camera.snapshot
              target:
                entity_id: camera.driveway
              data:
                filename: "/config/www/snapshots/driveway_{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg"
            card_mod:
              style: |
                ha-card {
                  background: var(--primary-color);
                  color: white;
                }

          - type: button
            name: Record
            icon: mdi:record-rec
            tap_action:
              action: call-service
              service: switch.toggle
              target:
                entity_id: switch.driveway_recording
            card_mod:
              style: |
                ha-card {
                  background: {{ '#f44336' if is_state('switch.driveway_recording', 'on') else 'var(--card-background-color)' }};
                  color: {{ 'white' if is_state('switch.driveway_recording', 'on') else 'var(--primary-text-color)' }};
                }

          - type: button
            name: Vehicle Log
            icon: mdi:car-multiple
            tap_action:
              action: navigate
              navigation_path: /lovelace/vehicle-log
            card_mod:
              style: |
                ha-card {
                  background: #2196f3;
                  color: white;
                }

          - type: button
            name: Light
            icon: mdi:lightbulb
            tap_action:
              action: call-service
              service: switch.toggle
              target:
                entity_id: switch.driveway_light
            card_mod:
              style: |
                ha-card {
                  background: {{ '#ff9800' if is_state('switch.driveway_light', 'on') else 'var(--card-background-color)' }};
                  color: {{ 'white' if is_state('switch.driveway_light', 'on') else 'var(--primary-text-color)' }};
                }

  # Motion & Vehicle Events Section
  - type: vertical-stack
    cards:
      - type: markdown
        content: "## Motion & Vehicle Events"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
            }
            .markdown-body {
              font-size: 1.2em;
              font-weight: 500;
              border-bottom: 2px solid var(--primary-color);
              padding-bottom: 8px;
            }

      - type: logbook
        entities:
          - binary_sensor.driveway_motion
          - binary_sensor.driveway_vehicle_detected
          - binary_sensor.driveway_person_detected
        hours_to_show: 12
        title: ""

      - type: history-graph
        title: Activity (Last 12 Hours)
        hours_to_show: 12
        entities:
          - entity: binary_sensor.driveway_motion
            name: Motion
          - entity: binary_sensor.driveway_vehicle_detected
            name: Vehicle
          - entity: binary_sensor.driveway_person_detected
            name: Person
        state_color: true

      # Vehicle Statistics
      - type: glance
        entities:
          - entity: sensor.driveway_vehicle_count_today
            name: Today
          - entity: sensor.driveway_vehicle_count_week
            name: This Week
          - entity: sensor.driveway_vehicle_count_month
            name: This Month
        show_state: true

      # Recent Vehicles
      - type: entities
        title: Recent Vehicles
        entities:
          - entity: sensor.driveway_last_vehicle_time
            name: Last Seen
          - entity: sensor.driveway_last_vehicle_type
            name: Type
          - entity: sensor.driveway_last_vehicle_direction
            name: Direction

  # Detection Zones
  - type: vertical-stack
    cards:
      - type: markdown
        content: "## Detection Zones"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
            }
            .markdown-body {
              font-size: 1.2em;
              font-weight: 500;
              border-bottom: 2px solid var(--primary-color);
              padding-bottom: 8px;
            }

      - type: entities
        title: Active Zones
        entities:
          - entity: binary_sensor.driveway_zone_entry
            name: Entry Zone
          - entity: binary_sensor.driveway_zone_parking_spot_1
            name: Parking Spot 1
          - entity: binary_sensor.driveway_zone_parking_spot_2
            name: Parking Spot 2
          - entity: binary_sensor.driveway_zone_street
            name: Street Zone

      - type: picture-entity
        entity: image.driveway_zones
        name: Zone Configuration
        show_state: false

  # Camera Information
  - type: vertical-stack
    cards:
      - type: markdown
        content: "## Camera Information"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
            }

      - type: entities
        entities:
          - entity: sensor.driveway_camera_model
            name: Model
          - entity: sensor.driveway_firmware_version
            name: Firmware
          - entity: sensor.driveway_ip_address
            name: IP Address
          - entity: sensor.driveway_wifi_signal
            name: WiFi Signal
          - entity: sensor.driveway_battery_level
            name: Battery Level
          - entity: sensor.driveway_stream_resolution
            name: Resolution

      - type: button
        name: Restart Camera
        icon: mdi:restart
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.driveway_restart
        card_mod:
          style: |
            ha-card {
              background: #f44336;
              color: white;
            }
