# =============================================================================
# WYZE CAMERA INTEGRATION
# =============================================================================
# Configuration for Wyze cameras using the wyzeapi integration
# Requires: HACS wyzeapi custom component
# API Key: Stored in secrets.yaml as wyze_api_key
# =============================================================================

# Wyze Integration via HACS wyzeapi
# Install from HACS: https://github.com/JoshuaMulliken/ha-wyzeapi

wyzeapi:
  - username: !secret wyze_username
    password: !secret wyze_password
    api_key: !secret wyze_api_key
    sensors:
      - switch
      - light
      - lock
      - climate
      - camera

