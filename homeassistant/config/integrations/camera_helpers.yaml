# =============================================================================
# CAMERA HELPERS - Input Booleans, Selects, and Buttons
# =============================================================================
# Helper entities for camera system control and automation
# =============================================================================

# =============================================================================
# INPUT BOOLEANS - Camera System Controls
# =============================================================================
input_boolean:
  # Master controls
  enable_all_cameras:
    name: Enable All Cameras
    icon: mdi:cctv
    initial: true

  enable_all_motion:
    name: Enable All Motion Detection
    icon: mdi:motion-sensor
    initial: true

  enable_all_recording:
    name: Enable All Recording
    icon: mdi:record-rec
    initial: true

  enable_notifications:
    name: Camera Notifications
    icon: mdi:bell
    initial: true

  enable_object_detection:
    name: Enable Object Detection
    icon: mdi:account-search
    initial: true

  camera_privacy_mode:
    name: Privacy Mode (All Indoor)
    icon: mdi:eye-off
    initial: false

  camera_away_mode:
    name: Away Mode
    icon: mdi:shield-home
    initial: false

  camera_night_mode:
    name: Night Mode
    icon: mdi:weather-night
    initial: false

  # Per-camera privacy toggles
  front_door_privacy:
    name: Front Door Privacy
    icon: mdi:eye-off
    initial: false

  living_room_privacy:
    name: Living Room Privacy
    icon: mdi:eye-off
    initial: false

  kitchen_privacy:
    name: Kitchen Privacy
    icon: mdi:eye-off
    initial: false

# =============================================================================
# INPUT SELECTS - Camera Settings
# =============================================================================
input_select:
  camera_quality:
    name: Stream Quality
    options:
      - Auto
      - High (1080p)
      - Medium (720p)
      - Low (480p)
    initial: Auto
    icon: mdi:quality-high

  camera_recording_mode:
    name: Recording Mode
    options:
      - Continuous
      - Motion Only
      - Smart Events
      - Off
    initial: Motion Only
    icon: mdi:record-rec

  night_vision_mode:
    name: Night Vision Mode
    options:
      - Auto
      - Always On
      - Always Off
    initial: Auto
    icon: mdi:weather-night

  camera_notification_priority:
    name: Notification Priority
    options:
      - All Events
      - People Only
      - Vehicles Only
      - Important Only
      - None
    initial: People Only
    icon: mdi:alert-circle

# =============================================================================
# INPUT NUMBERS - Camera Settings
# =============================================================================
input_number:
  motion_sensitivity_global:
    name: Global Motion Sensitivity
    min: 1
    max: 100
    step: 1
    initial: 50
    unit_of_measurement: '%'
    icon: mdi:tune

  camera_ptz_speed:
    name: PTZ Speed
    min: 1
    max: 10
    step: 1
    initial: 5
    icon: mdi:speedometer

  recording_length:
    name: Recording Length
    min: 10
    max: 300
    step: 10
    initial: 60
    unit_of_measurement: 's'
    icon: mdi:timer

# =============================================================================
# INPUT DATETIME - Camera Schedules
# =============================================================================
input_datetime:
  camera_night_mode_start:
    name: Night Mode Start
    has_time: true
    has_date: false
    initial: "22:00:00"

  camera_night_mode_end:
    name: Night Mode End
    has_time: true
    has_date: false
    initial: "06:00:00"

# =============================================================================
# BUTTONS - Camera Actions
# =============================================================================
button:
  - name: Snapshot All Cameras
    unique_id: snapshot_all_cameras
    icon: mdi:camera-burst

  - name: Restart All Cameras
    unique_id: restart_all_cameras
    icon: mdi:restart

  - name: Clear All Notifications
    unique_id: clear_camera_notifications
    icon: mdi:notification-clear-all

# =============================================================================
# COUNTERS - Camera Statistics
# =============================================================================
counter:
  motion_events_today:
    name: Motion Events Today
    initial: 0
    step: 1
    icon: mdi:motion-sensor

  person_detections_today:
    name: Person Detections Today
    initial: 0
    step: 1
    icon: mdi:account

  vehicle_detections_today:
    name: Vehicle Detections Today
    initial: 0
    step: 1
    icon: mdi:car

  package_detections_today:
    name: Package Detections Today
    initial: 0
    step: 1
    icon: mdi:package-variant-closed

# =============================================================================
# TIMERS - Camera Cooldowns
# =============================================================================
timer:
  front_door_motion_cooldown:
    name: Front Door Motion Cooldown
    duration: "00:02:00"

  back_yard_motion_cooldown:
    name: Back Yard Motion Cooldown
    duration: "00:02:00"

  garage_motion_cooldown:
    name: Garage Motion Cooldown
    duration: "00:02:00"

  driveway_motion_cooldown:
    name: Driveway Motion Cooldown
    duration: "00:01:00"

# =============================================================================
# TEXT INPUTS - Camera Configuration
# =============================================================================
input_text:
  camera_system_status:
    name: Camera System Status
    initial: "Online"
    icon: mdi:information

  last_camera_event:
    name: Last Camera Event
    initial: "None"
    icon: mdi:history
